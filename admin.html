<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panel Admin — Platform Undangan</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛠️</text></svg>">
<script src="db-config.js"></script>
<style>
:root{--bg:#f6f7f5;--card:#fff;--ink:#2f2a24;--muted:#8a8378;--sage:#8A9A82;--sage-d:#5F6E58;--gold:#C9A24B;--line:#e7e4dd;--danger:#c0564b;--ok:#4f8a4f}
*{box-sizing:border-box}
body{margin:0;font-family:'Poppins','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--ink)}
button{font-family:inherit;cursor:pointer}
.btn{border:none;background:var(--sage);color:#fff;padding:9px 14px;border-radius:10px;font-size:13px;font-weight:600;text-decoration:none;display:inline-block}
.btn:hover{background:var(--sage-d)}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
.btn.gold{background:var(--gold);color:#fff}
.btn.danger{background:var(--danger);color:#fff}
.btn.sm{padding:5px 9px;font-size:12px;border-radius:8px}
input,textarea,select{width:100%;font-family:inherit;font-size:14px;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink)}
textarea{min-height:90px;resize:vertical;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px}
.fld{display:block;margin:10px 0}
.fld span{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
#auth{max-width:380px;margin:8vh auto;background:var(--card);padding:28px;border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,.06)}
#auth h1{font-size:20px;margin:0 0 4px}
.sub{color:var(--muted);font-size:13px}
.msg{font-size:13px;padding:8px 10px;border-radius:8px;margin:10px 0;display:none}
.msg.err{background:#fbe9e7;color:var(--danger);display:block}
.msg.ok{background:#eaf1e6;color:var(--sage-d);display:block}
#app{display:none}
header.top{display:flex;align-items:center;gap:12px;padding:10px 18px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
.wrap{max-width:1040px;margin:0 auto;padding:18px}
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tabs button{border:1px solid var(--line);background:#fff;padding:8px 14px;border-radius:22px;font-size:13px}
.tabs button.active{background:var(--sage);color:#fff;border-color:var(--sage)}
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.stat{flex:1;min-width:130px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.stat b{font-size:22px;display:block}
.stat span{font-size:12px;color:var(--muted)}
table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;font-size:13px}
th,td{text-align:left;padding:9px 11px;border-bottom:1px solid var(--line);vertical-align:middle}
th{background:#faf9f6;font-size:12px;color:var(--muted);font-weight:600}
tr:last-child td{border-bottom:0}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;background:#eee;color:#555;white-space:nowrap}
.badge.published,.badge.paid,.badge.active{background:#eaf1e6;color:var(--sage-d)}
.badge.draft,.badge.pending{background:#fdf3e0;color:#a97b1e}
.badge.expired,.badge.failed,.badge.inactive{background:#fbe9e7;color:var(--danger)}
.row-actions{display:flex;gap:6px;flex-wrap:wrap}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}
.card h3{margin:0 0 10px;font-size:15px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.swatches{display:flex;gap:3px;margin-top:4px}
.sw{width:16px;height:16px;border-radius:4px;border:1px solid rgba(0,0,0,.1)}
.muted{color:var(--muted);font-size:12px}
@media(max-width:720px){.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<!-- ====== LOGIN ====== -->
<div id="auth">
  <h1>🛠️ Panel Admin</h1>
  <p class="sub">Khusus admin platform. Masuk untuk mengelola order, undangan, tema & lagu.</p>
  <div id="authMsg" class="msg"></div>
  <label class="fld"><span>Email</span><input id="email" type="email" autocomplete="username"></label>
  <label class="fld"><span>Password</span><input id="password" type="password" autocomplete="current-password"></label>
  <div style="margin-top:12px"><button class="btn" id="loginBtn" style="width:100%">Masuk sebagai Admin</button></div>
  <p class="sub" id="cfgWarn" style="margin-top:14px;display:none;color:var(--danger)"></p>
</div>

<!-- ====== APP ====== -->
<div id="app">
  <header class="top">
    <b>🛠️ Panel Admin</b>
    <span class="badge active" id="whoami"></span>
    <span style="flex:1"></span>
    <button class="btn ghost sm" id="reloadBtn">↻ Muat ulang</button>
    <button class="btn ghost sm" id="logoutBtn">Keluar</button>
  </header>
  <div class="wrap">
    <div class="stats" id="stats"></div>
    <div class="tabs" id="tabs"></div>
    <div id="panelMsg" class="msg"></div>
    <div id="view"></div>
  </div>
</div>

<script>
(function(){
  var DB=window.WEDDING_DB||{}, API=(DB.url||'').replace(/\/+$/,''), KEY=DB.anonKey||'';
  var token=null, userId=null, userEmail=null;
  var TAB='Undangan';
  var sites=[], orders=[], themes=[], songs=[], profilesById={};
  var el=function(id){return document.getElementById(id)};
  if(!API||!KEY){ var w=el('cfgWarn'); w.style.display='block'; w.textContent='⚠ db-config.js belum diisi (url & anonKey Supabase).'; }

  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function authMsg(m,c){ var x=el('authMsg'); x.className='msg '+(c||''); x.textContent=m; }
  function panelMsg(m,c){ var x=el('panelMsg'); x.className='msg '+(c||''); x.textContent=m; if(m){ setTimeout(function(){x.className='msg';x.textContent='';},4000);} }
  function fmtDate(s){ if(!s) return '—'; try{ return new Date(s).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}); }catch(e){ return s; } }
  function fmtRp(n){ n=Number(n)||0; return 'Rp'+n.toLocaleString('id-ID'); }

  // ---------- REST helpers (pakai token admin; RLS admin mengizinkan akses penuh) ----------
  function hdr(extra){ return Object.assign({apikey:KEY,Authorization:'Bearer '+(token||KEY),'Content-Type':'application/json'}, extra||{}); }
  function rest(path){ return API+'/rest/v1/'+path; }
  function get(path){ return fetch(rest(path),{headers:hdr()}).then(function(r){ return r.ok?r.json():Promise.reject(r.status); }); }
  function patch(path,body){ return fetch(rest(path),{method:'PATCH',headers:hdr({Prefer:'return=representation'}),body:JSON.stringify(body)}).then(function(r){ return r.ok?r.json():r.text().then(function(t){return Promise.reject(t);}); }); }
  function post(path,body){ return fetch(rest(path),{method:'POST',headers:hdr({Prefer:'return=representation'}),body:JSON.stringify(body)}).then(function(r){ return r.ok?r.json():r.text().then(function(t){return Promise.reject(t);}); }); }
  function del(path){ return fetch(rest(path),{method:'DELETE',headers:hdr()}).then(function(r){ return r.ok?true:r.text().then(function(t){return Promise.reject(t);}); }); }
  function rpc(name,body){ return fetch(rest('rpc/'+name),{method:'POST',headers:hdr(),body:JSON.stringify(body||{})}).then(function(r){ return r.ok?r.json():r.text().then(function(t){return Promise.reject(t);}); }); }

  // ---------- LOGIN ----------
  function login(){
    var email=el('email').value.trim(), pass=el('password').value;
    if(!API||!KEY){ return authMsg('db-config.js belum diisi.','err'); }
    if(!email||!pass){ return authMsg('Isi email & password.','err'); }
    authMsg('Memproses…','');
    fetch(API+'/auth/v1/token?grant_type=password',{method:'POST',headers:{apikey:KEY,'Content-Type':'application/json'},body:JSON.stringify({email:email,password:pass})})
      .then(function(r){return r.json()})
      .then(function(j){
        if(!j.access_token){ return authMsg(j.error_description||j.msg||'Login gagal.','err'); }
        token=j.access_token; userId=(j.user&&j.user.id); userEmail=(j.user&&j.user.email)||email;
        // Verifikasi role admin
        return get('profiles?id=eq.'+userId+'&select=role,email').then(function(rows){
          var role=(rows&&rows[0]&&rows[0].role);
          if(role!=='admin'){ token=null; return authMsg('Akun ini bukan admin. Set role=admin di tabel profiles.','err'); }
          el('auth').style.display='none'; el('app').style.display='block';
          el('whoami').textContent=userEmail+' · admin';
          loadAll();
        });
      })
      .catch(function(e){ authMsg('Login gagal: '+e,'err'); });
  }

  // ---------- LOAD DATA ----------
  function loadAll(){
    panelMsg('Memuat data…','');
    Promise.all([
      get('sites?select=id,slug,subdomain,owner_id,package,status,config,amount,paid,expires_at,created_at&order=created_at.desc'),
      get('orders?select=id,site_id,owner_id,package,amount,currency,status,provider,provider_ref,payment_url,months,created_at&order=created_at.desc'),
      get('themes?select=id,nama,template_file,palettes,sort,active&order=sort.asc'),
      get('songs?select=id,nama,artist,url,sort,active&order=sort.asc'),
      get('profiles?select=id,email,role')
    ]).then(function(res){
      sites=res[0]||[]; orders=res[1]||[]; themes=res[2]||[]; songs=res[3]||[];
      profilesById={}; (res[4]||[]).forEach(function(p){ profilesById[p.id]=p; });
      panelMsg('',''); renderStats(); renderTabs(); render();
    }).catch(function(e){ panelMsg('Gagal memuat: '+e,'err'); });
  }

  function renderStats(){
    var pub=sites.filter(function(s){return s.status==='published';}).length;
    var paidOrders=orders.filter(function(o){return o.status==='paid';});
    var revenue=paidOrders.reduce(function(a,o){return a+(Number(o.amount)||0);},0);
    var pending=orders.filter(function(o){return o.status==='pending';}).length;
    el('stats').innerHTML=
      stat(sites.length,'Total undangan')+
      stat(pub,'Terbit (published)')+
      stat(paidOrders.length,'Order lunas')+
      stat(pending,'Order pending')+
      stat(fmtRp(revenue),'Pendapatan');
  }
  function stat(v,l){ return '<div class="stat"><b>'+v+'</b><span>'+l+'</span></div>'; }

  function renderTabs(){
    var t=['Undangan','Order','Analitik','Perpustakaan Tema','Perpustakaan Lagu'];
    el('tabs').innerHTML=t.map(function(x){ return '<button class="'+(x===TAB?'active':'')+'" data-tab="'+x+'">'+x+'</button>'; }).join('');
    Array.prototype.forEach.call(el('tabs').children,function(b){ b.onclick=function(){ TAB=b.getAttribute('data-tab'); renderTabs(); render(); }; });
  }

  function render(){
    if(TAB==='Undangan') return renderSites();
    if(TAB==='Order') return renderOrders();
    if(TAB==='Analitik') return renderAnalytics();
    if(TAB==='Perpustakaan Tema') return renderThemes();
    if(TAB==='Perpustakaan Lagu') return renderSongs();
  }

  // ---------- UNDANGAN ----------
  function ownerEmail(id){ return (profilesById[id]&&profilesById[id].email)||(id?id.slice(0,8)+'…':'—'); }
  function renderSites(){
    if(!sites.length){ el('view').innerHTML='<p class="muted">Belum ada undangan.</p>'; return; }
    var rows=sites.map(function(s){
      return '<tr>'+
        '<td><b>'+esc(s.slug||'—')+'</b><br><small class="muted">'+esc((s.config&&s.config.style)||'—')+' / '+esc((s.config&&s.config.paletteId)||'—')+'</small></td>'+
        '<td>'+esc(ownerEmail(s.owner_id))+'</td>'+
        '<td><span class="badge '+s.status+'">'+s.status+'</span></td>'+
        '<td>'+esc(s.package||'—')+'</td>'+
        '<td>'+fmtDate(s.expires_at)+'</td>'+
        '<td><div class="row-actions">'+
          (s.status!=='published'?'<button class="btn sm gold" data-act="pub" data-id="'+s.id+'">Terbitkan</button>':'<button class="btn sm ghost" data-act="draft" data-id="'+s.id+'">Jadikan draft</button>')+
          '<button class="btn sm ghost" data-act="extend" data-id="'+s.id+'">+12 bln</button>'+
          '<button class="btn sm ghost" data-act="expire" data-id="'+s.id+'">Nonaktifkan</button>'+
          '<button class="btn sm danger" data-act="delsite" data-id="'+s.id+'">Hapus</button>'+
        '</div></td></tr>';
    }).join('');
    el('view').innerHTML='<table><thead><tr><th>Undangan</th><th>Pemilik</th><th>Status</th><th>Paket</th><th>Masa aktif</th><th>Aksi</th></tr></thead><tbody>'+rows+'</tbody></table>';
    bindActs();
  }

  function bindActs(){
    Array.prototype.forEach.call(el('view').querySelectorAll('[data-act]'),function(b){
      b.onclick=function(){ siteAction(b.getAttribute('data-act'), b.getAttribute('data-id')); };
    });
  }
  function siteAction(act,id){
    var s=sites.filter(function(x){return x.id===id;})[0]; if(!s&&act!=='delsite') return;
    if(act==='pub'){ patch('sites?id=eq.'+id,{status:'published'}).then(function(){panelMsg('Undangan diterbitkan.','ok');loadAll();}).catch(errp); }
    else if(act==='draft'){ patch('sites?id=eq.'+id,{status:'draft'}).then(function(){panelMsg('Dijadikan draft.','ok');loadAll();}).catch(errp); }
    else if(act==='expire'){ patch('sites?id=eq.'+id,{status:'expired'}).then(function(){panelMsg('Undangan dinonaktifkan.','ok');loadAll();}).catch(errp); }
    else if(act==='extend'){
      var base=s.expires_at?new Date(s.expires_at):new Date(); base.setMonth(base.getMonth()+12);
      patch('sites?id=eq.'+id,{expires_at:base.toISOString()}).then(function(){panelMsg('Masa aktif +12 bulan.','ok');loadAll();}).catch(errp);
    }
    else if(act==='delsite'){ if(!confirm('Hapus undangan ini permanen?')) return;
      del('sites?id=eq.'+id).then(function(){panelMsg('Undangan dihapus.','ok');loadAll();}).catch(errp); }
  }
  function errp(e){ panelMsg('Gagal: '+e,'err'); }

  // ---------- ORDER ----------
  function renderOrders(){
    if(!orders.length){ el('view').innerHTML='<p class="muted">Belum ada order.</p>'; return; }
    var rows=orders.map(function(o){
      return '<tr>'+
        '<td><small class="muted">'+esc((o.id||'').slice(0,8))+'…</small><br>'+fmtDate(o.created_at)+'</td>'+
        '<td>'+esc(ownerEmail(o.owner_id))+'</td>'+
        '<td>'+esc(o.package||'—')+'</td>'+
        '<td>'+fmtRp(o.amount)+'</td>'+
        '<td>'+esc(o.provider||'—')+'</td>'+
        '<td><span class="badge '+o.status+'">'+o.status+'</span></td>'+
        '<td><div class="row-actions">'+
          (o.status!=='paid'?'<button class="btn sm gold" data-o="paid" data-id="'+o.id+'">Tandai lunas</button>':'')+
          (o.status==='pending'?'<button class="btn sm danger" data-o="failed" data-id="'+o.id+'">Gagalkan</button>':'')+
          (o.payment_url?'<a class="btn sm ghost" href="'+esc(o.payment_url)+'" target="_blank">Link bayar</a>':'')+
        '</div></td></tr>';
    }).join('');
    el('view').innerHTML='<p class="muted" style="margin:0 0 8px">Pembayaran normalnya otomatis via webhook. “Tandai lunas” hanya untuk penanganan manual — ini akan otomatis menerbitkan & mengaktifkan undangannya.</p>'+
      '<table><thead><tr><th>Order</th><th>Pembeli</th><th>Paket</th><th>Jumlah</th><th>Provider</th><th>Status</th><th>Aksi</th></tr></thead><tbody>'+rows+'</tbody></table>';
    Array.prototype.forEach.call(el('view').querySelectorAll('[data-o]'),function(b){
      b.onclick=function(){ var st=b.getAttribute('data-o'); patch('orders?id=eq.'+b.getAttribute('data-id'),{status:st}).then(function(){panelMsg('Order diperbarui → '+st+'.','ok');loadAll();}).catch(errp); };
    });
  }

  // ---------- ANALITIK ----------
  function renderAnalytics(){
    el('view').innerHTML='<p class="muted">Memuat analitik…</p>';
    rpc('analytics_overview',{days:30}).then(function(a){
      a=a||{};
      var per=a.per_site||[], daily=a.daily||[];
      var max=daily.reduce(function(m,d){return Math.max(m,Number(d.views)||0);},1)||1;
      var bars=daily.map(function(d){
        var hh=Math.round(((Number(d.views)||0)/max)*84)+2;
        return '<div title="'+esc(d.day)+': '+(d.views||0)+' kunjungan" style="flex:1;min-width:4px;display:flex;flex-direction:column;justify-content:flex-end;align-items:center">'+
          '<div style="width:72%;background:var(--sage);border-radius:3px 3px 0 0;height:'+hh+'px"></div></div>';
      }).join('');
      var rows=per.map(function(p){
        return '<tr><td><b>'+esc(p.slug||((p.site_id||'')+'').slice(0,8)||'—')+'</b></td>'+
          '<td>'+(p.views||0)+'</td><td>'+(p.rsvp||0)+'</td><td>'+(p.wishes||0)+'</td>'+
          '<td>'+fmtDate(p.last_view)+'</td></tr>';
      }).join('');
      el('view').innerHTML=
        '<div class="stats">'+
          stat(a.total_views||0,'Total kunjungan')+
          stat(a.views_window||0,'Kunjungan 30 hari')+
          stat(a.rsvp_total||0,'Total RSVP')+
          stat(a.wish_total||0,'Total ucapan')+
        '</div>'+
        '<div class="card"><h3>Tren kunjungan (30 hari terakhir)</h3>'+
          '<div style="display:flex;align-items:flex-end;gap:2px;height:104px;padding-top:8px">'+(bars||'<span class="muted">Belum ada data kunjungan.</span>')+'</div></div>'+
        '<div class="card"><h3>Per undangan</h3>'+
          '<table><thead><tr><th>Undangan</th><th>Kunjungan</th><th>RSVP</th><th>Ucapan</th><th>Kunjungan terakhir</th></tr></thead><tbody>'+
          (rows||'<tr><td colspan=5 class="muted">Belum ada data.</td></tr>')+'</tbody></table></div>';
    }).catch(function(e){
      el('view').innerHTML='<div class="card"><p class="muted">Gagal memuat analitik: '+esc(String(e))+'</p>'+
        '<p class="muted">Pastikan <code>schema_phase4b.sql</code> sudah dijalankan di Supabase.</p></div>';
    });
  }

  // ---------- PERPUSTAKAAN TEMA ----------
  function paletteSwatches(pals){
    pals=pals||[]; if(typeof pals==='string'){ try{pals=JSON.parse(pals);}catch(e){pals=[];} }
    return pals.map(function(p){ var c=p.colors||{}; return '<div title="'+esc(p.name||p.id)+'" style="display:inline-flex;margin-right:8px;margin-top:4px"><div class="swatches">'+
      ['sage','gold','blush','cream','ink'].map(function(k){return '<div class="sw" style="background:'+(c[k]||'#ccc')+'"></div>';}).join('')+
      '</div></div>'; }).join('');
  }
  function renderThemes(){
    var rows=themes.map(function(t){
      var pals=t.palettes; if(typeof pals==='string'){try{pals=JSON.parse(pals);}catch(e){pals=[];}}
      return '<tr>'+
        '<td><b>'+esc(t.nama)+'</b><br><small class="muted">'+esc(t.id)+'</small></td>'+
        '<td><small class="muted">'+esc(t.template_file||'—')+'</small></td>'+
        '<td>'+((pals&&pals.length)||0)+' palet<br>'+paletteSwatches(pals)+'</td>'+
        '<td><span class="badge '+(t.active?'active':'inactive')+'">'+(t.active?'aktif':'nonaktif')+'</span></td>'+
        '<td><div class="row-actions">'+
          '<button class="btn sm ghost" data-t="toggle" data-id="'+esc(t.id)+'" data-v="'+(t.active?'0':'1')+'">'+(t.active?'Nonaktifkan':'Aktifkan')+'</button>'+
          '<button class="btn sm danger" data-t="del" data-id="'+esc(t.id)+'">Hapus</button>'+
        '</div></td></tr>';
    }).join('');
    el('view').innerHTML=
      '<div class="card"><h3>+ Tambah / perbarui style ke perpustakaan</h3>'+
        '<div class="grid2">'+
          '<label class="fld"><span>ID (huruf kecil, tanpa spasi) mis. luxury-gold</span><input id="t_id"></label>'+
          '<label class="fld"><span>Nama tampilan mis. Luxury Gold</span><input id="t_nama"></label>'+
          '<label class="fld"><span>File template (HTML) mis. undangan-luxury-gold.html</span><input id="t_file"></label>'+
          '<label class="fld"><span>Urutan (sort)</span><input id="t_sort" type="number" value="100"></label>'+
        '</div>'+
        '<label class="fld"><span>Palet warna (JSON array). Contoh sudah diisi — sesuaikan.</span>'+
          '<textarea id="t_pal">[{"id":"gold-black","name":"Gold & Black","colors":{"sage":"#C9A24B","sageDark":"#8C6E2E","gold":"#E9C86A","goldSoft":"#F2E4B8","blush":"#2B2B2B","ivory":"#12100C","cream":"#1D1A14","ink":"#F4ECD8","inkSoft":"#C9BFA6"}}]</textarea></label>'+
        '<button class="btn gold" id="t_save">Simpan style</button>'+
        '<p class="muted" style="margin:8px 0 0">Setelah simpan, daftarkan juga nama file template di objek <code>TEMPLATES</code> pada <code>index.html</code>.</p>'+
      '</div>'+
      '<table><thead><tr><th>Style</th><th>File template</th><th>Palet</th><th>Status</th><th>Aksi</th></tr></thead><tbody>'+(rows||'<tr><td colspan=5 class="muted">Belum ada style.</td></tr>')+'</tbody></table>';
    el('t_save').onclick=saveTheme;
    Array.prototype.forEach.call(el('view').querySelectorAll('[data-t]'),function(b){
      b.onclick=function(){ var a=b.getAttribute('data-t'), id=b.getAttribute('data-id');
        if(a==='toggle'){ patch('themes?id=eq.'+encodeURIComponent(id),{active:b.getAttribute('data-v')==='1'}).then(function(){loadAll();}).catch(errp); }
        else if(a==='del'){ if(!confirm('Hapus style '+id+'?'))return; del('themes?id=eq.'+encodeURIComponent(id)).then(function(){panelMsg('Style dihapus.','ok');loadAll();}).catch(errp); }
      };
    });
  }
  function saveTheme(){
    var id=el('t_id').value.trim().toLowerCase().replace(/\s+/g,'-');
    if(!id) return panelMsg('ID style wajib diisi.','err');
    var pal; try{ pal=JSON.parse(el('t_pal').value||'[]'); }catch(e){ return panelMsg('JSON palet tidak valid: '+e.message,'err'); }
    var body={id:id,nama:el('t_nama').value.trim()||id,template_file:el('t_file').value.trim(),sort:parseInt(el('t_sort').value,10)||100,active:true,palettes:pal};
    // upsert via POST dengan resolution=merge-duplicates
    fetch(rest('themes'),{method:'POST',headers:hdr({Prefer:'resolution=merge-duplicates,return=representation'}),body:JSON.stringify(body)})
      .then(function(r){ return r.ok?r.json():r.text().then(function(t){return Promise.reject(t);}); })
      .then(function(){ panelMsg('Style tersimpan.','ok'); loadAll(); }).catch(errp);
  }

  // ---------- PERPUSTAKAAN LAGU ----------
  function renderSongs(){
    var rows=songs.map(function(s){
      return '<tr>'+
        '<td><b>'+esc(s.nama)+'</b><br><small class="muted">'+esc(s.id)+'</small></td>'+
        '<td>'+esc(s.artist||'—')+'</td>'+
        '<td>'+(s.url?'<audio controls preload="none" src="'+esc(s.url)+'" style="height:30px"></audio>':'<span class="muted">(belum ada url)</span>')+'</td>'+
        '<td><span class="badge '+(s.active?'active':'inactive')+'">'+(s.active?'aktif':'nonaktif')+'</span></td>'+
        '<td><div class="row-actions">'+
          '<button class="btn sm ghost" data-s="toggle" data-id="'+esc(s.id)+'" data-v="'+(s.active?'0':'1')+'">'+(s.active?'Nonaktifkan':'Aktifkan')+'</button>'+
          '<button class="btn sm danger" data-s="del" data-id="'+esc(s.id)+'">Hapus</button>'+
        '</div></td></tr>';
    }).join('');
    el('view').innerHTML=
      '<div class="card"><h3>+ Tambah lagu ke perpustakaan</h3>'+
        '<div class="grid2">'+
          '<label class="fld"><span>ID (mis. lagu-romantis-1)</span><input id="s_id"></label>'+
          '<label class="fld"><span>Judul lagu</span><input id="s_nama"></label>'+
          '<label class="fld"><span>Artis</span><input id="s_artist"></label>'+
          '<label class="fld"><span>Urutan (sort)</span><input id="s_sort" type="number" value="100"></label>'+
        '</div>'+
        '<label class="fld"><span>URL file audio (mp3). Upload dulu ke Supabase Storage / CDN, tempel link publiknya.</span><input id="s_url" placeholder="https://…/lagu.mp3"></label>'+
        '<button class="btn gold" id="s_save">Simpan lagu</button>'+
      '</div>'+
      '<table><thead><tr><th>Lagu</th><th>Artis</th><th>Preview</th><th>Status</th><th>Aksi</th></tr></thead><tbody>'+(rows||'<tr><td colspan=5 class="muted">Belum ada lagu.</td></tr>')+'</tbody></table>';
    el('s_save').onclick=saveSong;
    Array.prototype.forEach.call(el('view').querySelectorAll('[data-s]'),function(b){
      b.onclick=function(){ var a=b.getAttribute('data-s'), id=b.getAttribute('data-id');
        if(a==='toggle'){ patch('songs?id=eq.'+encodeURIComponent(id),{active:b.getAttribute('data-v')==='1'}).then(function(){loadAll();}).catch(errp); }
        else if(a==='del'){ if(!confirm('Hapus lagu '+id+'?'))return; del('songs?id=eq.'+encodeURIComponent(id)).then(function(){panelMsg('Lagu dihapus.','ok');loadAll();}).catch(errp); }
      };
    });
  }
  function saveSong(){
    var id=el('s_id').value.trim().toLowerCase().replace(/\s+/g,'-');
    if(!id) return panelMsg('ID lagu wajib diisi.','err');
    if(!el('s_url').value.trim()) return panelMsg('URL audio wajib diisi.','err');
    var body={id:id,nama:el('s_nama').value.trim()||id,artist:el('s_artist').value.trim(),url:el('s_url').value.trim(),sort:parseInt(el('s_sort').value,10)||100,active:true};
    fetch(rest('songs'),{method:'POST',headers:hdr({Prefer:'resolution=merge-duplicates,return=representation'}),body:JSON.stringify(body)})
      .then(function(r){ return r.ok?r.json():r.text().then(function(t){return Promise.reject(t);}); })
      .then(function(){ panelMsg('Lagu tersimpan.','ok'); loadAll(); }).catch(errp);
  }

  // ---------- WIRING ----------
  el('loginBtn').onclick=login;
  el('password').addEventListener('keydown',function(e){ if(e.key==='Enter') login(); });
  el('logoutBtn').onclick=function(){ token=null;userId=null; el('app').style.display='none'; el('auth').style.display='block'; authMsg('',''); };
  el('reloadBtn').onclick=loadAll;
  window.__ADMIN=  { get state(){return {sites:sites,orders:orders,themes:themes,songs:songs};} }; // untuk QA
  window.__ADMIN_READY=true;
})();
</script>
</body>
</html>
